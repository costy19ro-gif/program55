name: Auto Scraper

on:
  schedule:
    - cron: "0 */12 * * *"  # Rulează la fiecare 12 ore
  workflow_dispatch:        # Permite pornirea manuală din interfața GitHub

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run scraper
        run: python scraper_scores24.py

      - name: Commit updated JSON
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          
          # Verificăm dacă fișierul există și nu este complet gol (dimensiune > 0)
          if [ -s scores24.json ]; then
            git add scores24.json
            # Execută commit doar dacă există modificări reale în fișier
            git diff-index --quiet HEAD || git commit -m "Auto update scores24.json [skip ci]"
            git push
          else
            echo "Fișierul JSON este gol sau lipsește. Push anulat."
          fi
