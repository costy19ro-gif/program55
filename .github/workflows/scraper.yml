name: Auto Scraper

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f program55/requirements.txt ]; then pip install -r program55/requirements.txt; fi

      - name: Run scraper
        run: |
          # Căutăm fișierul în tot repository-ul
          SCRIPT_PATH=$(find . -name "scraper_scores24.py" -print -quit)
          
          if [ -z "$SCRIPT_PATH" ]; then
            echo "❌ EROARE: Fișierul scraper_scores24.py nu a fost găsit nicăieri în proiect!"
            exit 1
          fi
          
          echo "Fișierul a fost localizat cu succes la: $SCRIPT_PATH"
          
          # Intrăm în folderul în care se află scriptul pentru ca salvările JSON să se facă corect
          DIR_PATH=$(dirname "$SCRIPT_PATH")
          cd "$DIR_PATH"
          
          # Rulăm scriptul
          python "scraper_scores24.py"

      - name: Commit updated JSON
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          
          # Adăugăm fișierul JSON indiferent unde a fost generat
          JSON_PATH=$(find . -name "scores24.json" -print -quit)
          
          if [ -n "$JSON_PATH" ] && [ -s "$JSON_PATH" ]; then
            git add "$JSON_PATH"
            git diff-index --quiet HEAD || git commit -m "Auto update scores24.json [skip ci]"
            git push
          else
            echo "Fișierul JSON este gol sau nu a fost găsit."
          fi
